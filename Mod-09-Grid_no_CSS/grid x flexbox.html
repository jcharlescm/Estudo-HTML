<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid x Flexbox</title>

    <style>
      body {
        display: grid;
        gap: 50px;
      }

      a {
        display: grid;
        place-items: center;

        padding: 10px;
        border: 1px solid black;
      }

      .grid,
      .flexbox {
        gap: 5px;
      }

      .flexbox {
        display: flex;
        flex-wrap: wrap;
      }

      .grid {
        display: grid;
      }

      .grid-fit {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }

      .grid-fill {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    </style>
  </head>
  <body>
    <nav class="flexbox">
      <a href="">Curso de Excel</a>
      <a href="">Curso de Power BI</a>
      <a href="">Curso de Python</a>
      <a href="">Outros Cursos</a>
      <a href="">Para Empresas</a>
      <a href="">Blog</a>
      <a href="">Contato</a>
    </nav>

    <nav class="grid grid-fit">
      <a href="">Curso de Excel</a>
      <a href="">Curso de Power BI</a>
      <a href="">Curso de Python</a>
      <a href="">Outros Cursos</a>
      <a href="">Para Empresas</a>
      <a href="">Blog</a>
      <a href="">Contato</a>
    </nav>

    <nav class="grid grid-fill">
      <a href="">Curso de Excel</a>
      <a href="">Curso de Power BI</a>
      <a href="">Curso de Python</a>
      <a href="">Outros Cursos</a>
      <a href="">Para Empresas</a>
      <a href="">Blog</a>
      <a href="">Contato</a>
    </nav>
  </body>
</html>
