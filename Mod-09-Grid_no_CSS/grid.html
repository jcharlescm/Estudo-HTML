<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
  </head>
  <body>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      html {
        font-size: 62.5%;
      }

      .grid {
        height: 60rem;
        display: grid;

        align-content: center;
        justify-content: center;

        row-gap: 3rem;
        column-gap: 1rem;
        /* gap: 2rem; */

        /* grid-column-gap: ;
        grid-row-gap: ;
        grid-gap: ; */

        /* grid-auto-flow: column; */
        /* grid-auto-rows: 40rem; */
        grid-auto-rows: 10rem;
        grid-template-columns: repeat(3, 10rem);
        grid-template-areas:
          "area area area"
          "b b c"
          "b b c"
          "d d e";
        /* grid-auto-columns: 1fr 2fr 1fr; */

        /* grid-template-rows / grid-template-columns */
        /* grid: repeat(3, 1fr) / repeat(2, 1fr) 2fr 1fr; */

        /* grid-template-rows / auto-flow = column grid-auto-columns? */
        /* grid: 1fr 2fr 3fr / auto-flow 40rem; */

        /* auto-flow = row grid-auto-rows? / grid-template-columns */
        /* grid: auto-flow 40rem / repeat(3, 1fr); */

        & div {
          display: flex;
          justify-content: center;
          align-items: center;
          font-size: 2.76rem;
          font-weight: 700;
          color: white;
          background-color: red;
        }

        & .div1 {
          /* grid-column: 4 / 5; */
          /* grid-column-start: 4;
          grid-column-end: 5; */
          grid-area: area;
        }

        & .div2 {
          background-color: blue;
          /* grid-column: span 3 / 5; */
          /* grid-column-start: 1;
          grid-column-end: 2; */
          /* grid-row: 1 / span 3; */
          /* grid-row-start: 1;
          grid-row-end: 1; */

          /* grid-row-start / grid-row-end / grid-column-start / grid-column-end */
          /* grid-area: 2 / 3 / 3 / span 2; */

          /* grid-row-start / grid-row-end / grid-column-start */
          /* grid-area: 2 / 3 / 3; */

          /* grid-row-start / grid-column-start */
          /* grid-area: 2 / 4; */

          /* grid-template-areas */
          /* grid-area: string; */
          grid-area: b;
        }

        & .div3 {
          background-color: green;
          /* grid-column: 3/5; */
          /* grid-row: 2/3; */
          grid-area: c;
        }

        & .div4 {
          background-color: yellow;
          color: black;
          grid-area: d;
        }

        & .div5 {
          background-color: lime;
          grid-area: e;
        }
      }
    </style>
    <div class="grid">
      <div class="div1">a</div>
      <div class="div2">b</div>
      <div class="div3">c</div>
      <div class="div4">d</div>
      <div class="div5">e</div>
    </div>
  </body>
</html>
